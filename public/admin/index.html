<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" data-cfasync="false"></script>
    <script>
      fetch('/api/admin-config')
        .then((r) => {
          if (!r.ok) throw new Error('admin-config fetch failed: ' + r.status);
          return r.json();
        })
        .then((config) => {
          if (!window.CMS) {
            document.body.innerHTML =
              '<pre style="padding:2rem;font-family:system-ui">Sveltia CMS script failed to load.</pre>';
            return;
          }
          window.CMS.init({ load_config_file: false, config });
        })
        .catch((err) => {
          document.body.innerHTML =
            '<pre style="padding:2rem;font-family:system-ui">' +
            String(err && err.message ? err.message : err) +
            '\n\nCheck that GITHUB_REPO is set in your Cloudflare Pages environment variables.</pre>';
        });
    </script>
  </body>
</html>
